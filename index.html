<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 게시판</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        #board { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: white; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .post { border-bottom: 1px solid #eee; padding: 8px 0; }
        .input-area { display: flex; gap: 5px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #content { flex-grow: 1; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>🚀 실시간 게시판</h2>

    <div id="board"></div>

    <div class="input-area">
        <input id="nickname" type="text" placeholder="닉네임" style="width: 80px;">
        <input id="content" type="text" placeholder="내용을 입력하세요!" onkeypress="if(event.keyCode==13) send()">
        <button onclick="send()">올리기</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');
        const input = document.getElementById('content');
        const nickInput = document.getElementById('nickname');

        // 전송 버튼 누를 때 실행
        function send() {
            const nick = nickInput.value || '익명';
            const msg = input.value;
            
            if (msg) {
                // 서버로 {닉네임, 내용} 전송
                socket.emit('new_post', { nickname: nick, content: msg });
                input.value = ''; // 입력창 비우기
            }
        }

        // 서버에서 메시지를 받았을 때 화면에 추가
        socket.on('show_post', (data) => {
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <strong style="color: #007bff;">${data.nickname}</strong> 
                <span style="font-size: 0.8em; color: #999;">(${data.time})</span><br>
                ${data.content}
            `;
            board.prepend(post); // 최신글이 위로 오게 함
        });
    </script>
</body>
</html>
